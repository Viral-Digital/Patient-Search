const styles = `

  .logout-btn { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:7px; color:rgba(255,255,255,0.35); font-size:12px; font-weight:500; cursor:pointer; border:none; background:transparent; width:100%; text-align:left; font-family:inherit; margin-top:4px; transition:color 0.15s,background 0.15s; }

  /* ─── MAIN ─── */

  /* ─── TWO + ONE COLUMN GRID ─── */
  .dash-grid { display:grid; grid-template-columns:1fr 340px; gap:16px; margin-bottom:16px; }

  /* ─── SHARED CARD ─── */

  /* ─── DOCTORS LIST ─── */

  /* ─── RECENT ACTIVITY ─── */

  .link-btn-red { color:#ef4444; font-size:12.5px; font-weight:500; background:none; border:none; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:4px; white-space:nowrap; }

  /* ─── BADGES ─── */
  .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:600; letter-spacing:0.2px; white-space:nowrap; }

  .badge-inactive    { background:#f3f4f6; color:#6b7280; }
  .badge-pending-s   { background:#fef9c3; color:#a16207; }

  .btn-add { display:flex; align-items:center; gap:8px; padding:10px 18px; border-radius:8px; background:white; color:#111827; font-size:13.5px; font-weight:500; font-family:inherit; cursor:pointer; border:1.5px solid #e5e7eb; white-space:nowrap; transition:background 0.15s; }

  .search-icon-abs { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#9ca3af; pointer-events:none; display:flex; }

  .search-inp::placeholder { color:#9ca3af; }
  .btn-search { display:flex; align-items:center; gap:8px; padding:11px 24px; border-radius:8px; background:#22c55e; color:white; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; border:none; transition:background 0.15s; }

  .empty-icon-wrap { width:56px; height:56px; display:flex; align-items:center; justify-content:center; margin-bottom:18px; }
  .empty-icon-wrap svg { width:44px; height:44px; color:#22c55e; stroke-width:1.5; }
  .empty-title { font-size:15px; font-weight:600; color:#111827; margin-bottom:8px; }
  .empty-text  { font-size:13.5px; color:#6b7280; line-height:1.6; max-width:360px; }
  .kbd-inline  { display:inline-flex; background:white; border:1px solid #e5e7eb; border-radius:4px; padding:1px 6px; font-size:11.5px; color:#6b7280; vertical-align:middle; margin:0 2px; }

  /* queue table */
  .queue-table-wrap { background:white; border:1px solid #e5e7eb; border-radius:10px; overflow:hidden; margin-bottom:16px; }
  .dept-select { padding:9px 36px 9px 14px; border:1.5px solid #e5e7eb; border-radius:8px; font-size:13.5px; font-family:inherit; color:#111827; background:white; outline:none; appearance:none; cursor:pointer; }
  .dept-select:focus { border-color:#22c55e; }
  .btn-call { display:flex; align-items:center; gap:8px; padding:10px 20px; border-radius:8px; background:#22c55e; color:white; font-size:13.5px; font-weight:600; font-family:inherit; cursor:pointer; border:none; transition:background 0.15s; }
  .btn-call:hover { background:#16a34a; }
  .btn-checkin { display:flex; align-items:center; gap:8px; padding:10px 20px; border-radius:8px; background:white; color:#111827; font-size:13.5px; font-weight:600; font-family:inherit; cursor:pointer; border:1.5px solid #e5e7eb; transition:background 0.15s; }
  .btn-checkin:hover { background:#f7f8fa; }
  .q-row-border { border-left:4px solid transparent; }
  .q-row-border.waiting          { border-left-color:#3b82f6; }
  .q-row-border.in-consultation  { border-left-color:#22c55e; }
  .q-row-border.done             { border-left-color:#d1d5db; }
  .wait-time-cell { display:flex; align-items:center; gap:5px; }
  .wait-val { font-weight:700; font-size:14px; color:#ef4444; }
  .q-actions { display:flex; align-items:center; gap:14px; }
  .btn-call-sm { display:flex; align-items:center; gap:6px; padding:7px 16px; border-radius:7px; background:#22c55e; color:white; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; border:none; transition:background 0.15s; }
  .btn-call-sm:hover { background:#16a34a; }
  .btn-view-sm { display:flex; align-items:center; gap:5px; color:#374151; font-size:13px; font-weight:500; background:none; border:none; cursor:pointer; font-family:inherit; }

  /* stats grid */
  .stats-grid { display:grid; gap:14px; margin-bottom:16px; }
  .stats-4 { grid-template-columns:repeat(4,1fr); }
  .stats-3 { grid-template-columns:repeat(3,1fr); }
  .stat-card2 { background:white; border:1px solid #e5e7eb; border-radius:10px; padding:16px 18px; }
  .stat-label2 { font-size:11.5px; color:#6b7280; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .stat-value2 { font-size:26px; font-weight:800; color:#111827; letter-spacing:-0.5px; }
  .stat-sub2   { font-size:12px; color:#6b7280; margin-top:3px; }
  .c-green { color:#22c55e; } .c-blue { color:#3b82f6; } .c-red { color:#ef4444; }

  /* tabs */
  .tabs-bar { display:flex; border-bottom:1px solid #e5e7eb; padding:0 18px; }
  .tab-btn { padding:11px 16px; font-size:13.5px; font-weight:500; color:#6b7280; cursor:pointer; border:none; background:none; font-family:inherit; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 0.15s,border-color 0.15s; }
  .tab-btn:hover { color:#111827; }
  .tab-btn.active { color:#22c55e; border-bottom-color:#22c55e; }
  .tab-pill { margin-left:5px; font-size:11px; background:#f3f4f6; color:#6b7280; border-radius:10px; padding:1px 6px; }
  .tab-btn.active .tab-pill { background:#dcfce7; color:#15803d; }

  /* vitals */
  .vitals-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
  .vital-card { background:white; border:1px solid #e5e7eb; border-radius:8px; padding:14px 16px; }
  .vital-label { font-size:11px; color:#6b7280; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .vital-value { font-size:20px; font-weight:700; color:#111827; }

  /* billing */
  .filter-sel { padding:7px 12px; border:1.5px solid #e5e7eb; border-radius:7px; font-size:13px; font-family:inherit; color:#374151; background:white; outline:none; cursor:pointer; appearance:none; }
  .filter-sel:focus { border-color:#22c55e; }

  /* reports */
  .two-col-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  /* modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:flex; align-items:center; justify-content:center; z-index:100; animation:fadeIn 0.15s ease; }
  .modal-box { background:white; border-radius:12px; padding:28px; width:100%; max-width:520px; box-shadow:0 20px 60px rgba(0,0,0,0.15); animation:slideUp 0.2s ease; max-height:90vh; overflow-y:auto; }
  .modal-box::-webkit-scrollbar { width:5px; }
  .modal-box::-webkit-scrollbar-thumb { background:#e5e7eb; border-radius:8px; }
  @keyframes fadeIn  { from{opacity:0}to{opacity:1} }
  @keyframes slideUp { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
  .modal-hd  { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .modal-ttl { font-size:16px; font-weight:700; color:#111827; }
  .modal-x   { width:30px; height:30px; border-radius:6px; border:none; background:#f3f4f6; color:#6b7280; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; line-height:1; }
  .modal-x:hover { background:#e5e7eb; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:8px; }
  .fg { display:flex; flex-direction:column; gap:5px; }
  .fg.full { grid-column:1/-1; }
  .flabel { font-size:12.5px; font-weight:500; color:#111827; }
  .finput,.fselect { padding:9px 12px; border:1.5px solid #e5e7eb; border-radius:7px; font-size:13.5px; font-family:inherit; color:#111827; background:white; outline:none; transition:border-color 0.15s,box-shadow 0.15s; appearance:none; }
  .finput:focus,.fselect:focus { border-color:#22c55e; box-shadow:0 0 0 3px rgba(34,197,94,0.1); }
  .finput::placeholder { color:#9ca3af; }
  .finput[readOnly]    { background:#f9fafb; color:#9ca3af; }
  .modal-ft { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; padding-top:20px; border-top:1px solid #e5e7eb; }
  .btn-cancel { padding:9px 20px; border:1.5px solid #e5e7eb; border-radius:7px; background:white; font-size:13.5px; font-weight:500; font-family:inherit; color:#6b7280; cursor:pointer; }
  .btn-cancel:hover { background:#f7f8fa; }
  .btn-submit { padding:9px 22px; border:none; border-radius:7px; background:#22c55e; font-size:13.5px; font-weight:600; font-family:inherit; color:white; cursor:pointer; }
  .btn-submit:hover { background:#16a34a; }

  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
  .live-dot { width:8px; height:8px; background:#22c55e; border-radius:50%; display:inline-block; margin-right:6px; animation:pulse 2s infinite; }
`;

function fmtWait(m){ return m>=60?`${Math.floor(m/60)}h ${m%60}m`:`${m}m`; }

function now(){
  const d=new Date();
  return d.toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

function LoginScreen({ onLogin }) {
  const [role, setRole] = useState("doctor");
  const [pass, setPass] = useState("");
  const [error, setError] = useState(false);

  const submit = e => {
    if (e && e.preventDefault) e.preventDefault();
    if (pass.length < 3) { setError(true); return; }
    onLogin(role);
  };

  return (
    <div className="login-screen">
      <div className="login-left">
        <div className="login-left-brand">
          <div className="login-logo-row">
            <div className="login-logo-box">6H</div>
            <span className="login-brand-name">6030 Health</span>
          </div>
          <div className="login-headline">Smarter Care,<br/><span>Better Outcomes.</span></div>
          <div className="login-tagline">A unified hospital management platform built for modern healthcare teams across Nigeria.</div>
        </div>
        <div className="login-stats">
          {[["2,847+","Patients Registered"],["6","Departments"],["98%","Uptime SLA"]].map(([v,l])=>(
            <div className="login-stat" key={l}><div className="login-stat-val">{v}</div><div className="login-stat-lbl">{l}</div></div>
          ))}
        </div>
      </div>

      <div className="login-right">
        <div className="login-welcome">Welcome back 👋</div>
        <div className="login-sub">Select your role and sign in to continue</div>

        <div style={{fontSize:12,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:10}}>I am a…</div>
        <div className="role-grid">
          {ROLES.map(r=>(
            <div key={r.id} className={`role-card${role===r.id?" selected":""}`} onClick={()=>setRole(r.id)}>
              <div className="role-card-icon" style={{background:r.color+"22"}}>
                <svg width="18" height="18" fill="none" stroke={r.color} viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              </div>
              <div className="role-card-text">
                <div className="role-card-name">{r.name}</div>
                <div className="role-card-dept">{r.dept}</div>
              </div>
            </div>
          ))}
        </div>

        <div>
          <label className="login-label">Staff ID / Email</label>
          <input className="login-input" placeholder="e.g. staff@6030health.com" defaultValue="demo@6030health.com" />
          <label className="login-label">Password</label>
          <input
            className="login-input"
            type="password"
            placeholder="Enter your password"
            value={pass}
            onChange={e=>{setPass(e.target.value);setError(false);}}
            onKeyDown={e=>e.key==="Enter"&&submit(e)}
            style={error?{borderColor:"#ef4444"}:{}}
          />
          {error && <div style={{fontSize:12.5,color:"#ef4444",marginBottom:8,marginTop:-8}}>Please enter a password (min 3 chars)</div>}
          <button className="login-btn" onClick={submit}>Sign In →</button>
        </div>
        <div className="login-hint">Demo: select any role above, type any password (3+ chars)</div>
      </div>
    </div>
  );
}

                <div className="act-time">{a.time}</div>
              </div>
            </div>
          ))}

function AddPatientModal({ onClose, onAdd }) {
  const [f, setF] = useState({ firstName:"", lastName:"", dob:"", gender:"", phone:"", email:"", address:"", status:"active" });
  const set = k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const submit = () => {
    if (!f.firstName || !f.lastName || !f.phone) return;
    onAdd(f); onClose();
  };
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-hd"><span className="modal-ttl">Add New Patient</span><button className="modal-x" onClick={onClose}>×</button></div>
        <div>
          <div className="form-grid">
            <div className="fg"><label className="flabel">First Name *</label><input className="finput" placeholder="John" value={f.firstName} onChange={set("firstName")} /></div>
            <div className="fg"><label className="flabel">Last Name *</label><input className="finput" placeholder="Doe" value={f.lastName} onChange={set("lastName")} /></div>
            <div className="fg"><label className="flabel">Date of Birth *</label><input className="finput" type="date" value={f.dob} onChange={set("dob")} /></div>
            <div className="fg"><label className="flabel">Gender</label><select className="fselect" value={f.gender} onChange={set("gender")}><option value="">Select</option><option>Male</option><option>Female</option><option>Non-binary</option></select></div>
            <div className="fg"><label className="flabel">Phone *</label><input className="finput" type="tel" placeholder="(555) 000-0000" value={f.phone} onChange={set("phone")} /></div>
            <div className="fg"><label className="flabel">MRN</label><input className="finput" readOnly placeholder="Auto-generated" /></div>
            <div className="fg full"><label className="flabel">Email</label><input className="finput" type="email" placeholder="patient@email.com" value={f.email} onChange={set("email")} /></div>
            <div className="fg full"><label className="flabel">Address</label><input className="finput" placeholder="123 Main Street, City" value={f.address} onChange={set("address")} /></div>
            <div className="fg full"><label className="flabel">Status</label><select className="fselect" value={f.status} onChange={set("status")}><option value="active">Active</option><option value="pending">Pending</option><option value="inactive">Inactive</option></select></div>
          </div>
          <div className="modal-ft"><button className="btn-cancel" onClick={onClose}>Cancel</button><button className="btn-submit" onClick={submit}>Register Patient</button></div>
        </div>
      </div>
    </div>
  );
}

      <div className="pat-header">
        <div><h1 className="page-title">Search Patients</h1><p className="page-subtitle">Find patients by name, MRN, or phone number</p></div>
        <button className="btn-add" onClick={()=>setModal(true)}><span className="btn-add-icon">{Ico.plus()}</span>Add New Patient</button>
      </div>
      <div className="search-row">
        <div className="search-wrap">
          <span className="search-icon-abs">{Ico.search(16)}</span>
          <input className="search-inp" placeholder="Search patients by name, MRN, or phone..."
            value={query} onChange={e=>{setQuery(e.target.value);if(!e.target.value.trim())setSearched(false);}}
            onKeyDown={e=>e.key==="Enter"&&query.trim()&&setSearched(true)} />
        </div>
        <button className="btn-search" onClick={()=>query.trim()&&setSearched(true)}>{Ico.search(15)} Search</button>
      </div>
      {!searched?(
        <div className="empty-state">
          <div className="empty-icon-wrap"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg></div>
          <div className="empty-title">Search for patients</div>
          <div className="empty-text">Enter a name, MRN, or phone number.<br/>You can also use <span className="kbd-inline">⌘K</span> for quick search.</div>
        </div>
      ):(
        <div className="card" style={{animation:"fadeIn 0.2s ease"}}>
          <div className="card-hd"><div className="card-hd-left"><span className="card-title">Results</span><span className="pill-count">{results.length} patients</span></div></div>
          {results.length===0?<div style={{padding:"40px",textAlign:"center",color:"#6b7280"}}>No patients found.</div>:(
            <table className="tbl">
              <thead><tr><th>Patient</th><th>MRN</th><th>DOB</th><th>Phone</th><th>Last Visit</th><th>Status</th><th></th></tr></thead>
              <tbody>{results.map(p=>(
                <tr key={p.id}>
                  <td><div className="pt-name">{p.name}</div><div className="pt-email">{p.email}</div></td>
                  <td>{p.mrn}</td><td>{p.dob}</td><td>{p.phone}</td><td>{p.lastVisit}</td>
                  <td><span className={`badge badge-${p.status==="active"?"active":p.status==="inactive"?"inactive":"pending-s"}`}>{p.status}</span></td>
                  <td><button className="link-btn">View →</button></td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
      )}
      {modal&&<AddPatientModal onClose={()=>setModal(false)} onAdd={d=>{onAdd(d);setModal(false);}} />}
    </>
  );
}

/* ══════════════════════════════════════════════
   QUEUE PAGE
══════════════════════════════════════════════ */
function QueuePage() {
  const [queue, setQueue] = useState(INIT_QUEUE);
  const [dept, setDept]   = useState("All Departments");
  useEffect(()=>{
    const t=setInterval(()=>setQueue(q=>q.map(r=>r.status==="done"?r:{...r,waitMins:r.waitMins+1})),60000);
    return ()=>clearInterval(t);
  },[]);
  const depts=["All Departments","General Practice","Gynecology","Pediatrics","Cardiology"];
  const visible=dept==="All Departments"?queue:queue.filter(r=>r.dept===dept);
  const callNext=()=>setQueue(q=>{const i=q.findIndex(r=>r.status==="waiting");return i===-1?q:q.map((r,idx)=>idx===i?{...r,status:"in-consultation"}:r);});
  const callOne=id=>setQueue(q=>q.map(r=>r.id===id?{...r,status:"in-consultation"}:r));
  const removeOne=id=>setQueue(q=>q.filter(r=>r.id!==id));
  const statusBadge=s=>{if(s==="waiting")return<span className="badge badge-waiting">WAITING</span>;if(s==="in-consultation")return<span className="badge badge-consultation">IN CONSULTATION</span>;if(s==="done")return<span className="badge badge-done">DONE</span>;};
  return (
    <>
      <div className="pat-header">
        <div><h1 className="page-title">Outpatient Queue</h1><p className="page-subtitle"><span className="live-dot"/>Real-time department queue. Auto-refreshes every 15 seconds.</p></div>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.7px"}}>Department</span>
          <select className="dept-select" value={dept} onChange={e=>setDept(e.target.value)}>{depts.map(d=><option key={d}>{d}</option>)}</select>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="btn-call" onClick={callNext}>{Ico.phone(16)} Call Next Patient</button>
          <button className="btn-checkin">{Ico.userPlus(16)} Check In Patient</button>
        </div>
      </div>
      <div className="queue-table-wrap">
        <table className="tbl">
          <thead><tr><th style={{width:50}}>#</th><th>Patient</th><th>MRN</th><th>Department</th><th>Check-In</th><th>Wait Time</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>{visible.map(r=>(
            <tr key={r.id} style={{borderLeft:`4px solid ${r.status==="waiting"?"#3b82f6":r.status==="in-consultation"?"#22c55e":"#d1d5db"}`}}>
              <td style={{fontWeight:700,fontSize:15,color:"#374151"}}>{r.num}</td>
              <td><div className="pt-name">{r.name}</div>{r.status==="in-consultation"&&<div className="pt-sub">{r.doctor}</div>}</td>
              <td style={{color:"#6b7280",fontSize:13}}>{r.mrn}</td>
              <td>{r.dept}</td><td>{r.checkIn}</td>
              <td>{r.status==="done"?<span style={{color:"#9ca3af"}}>—</span>:<div style={{display:"flex",alignItems:"center",gap:5}}><span style={{color:"#ef4444"}}>{Ico.warn(15)}</span><span style={{fontWeight:700,fontSize:14,color:"#ef4444"}}>{fmtWait(r.waitMins)}</span></div>}</td>
              <td>{statusBadge(r.status)}</td>
              <td><div style={{display:"flex",alignItems:"center",gap:14}}>
                {r.status==="waiting"&&<button className="btn-call-sm" onClick={()=>callOne(r.id)}>{Ico.phone(13)} Call</button>}
                <button className="btn-view-sm">{Ico.extlink(13)} View</button>
                <button className="link-btn-red" onClick={()=>removeOne(r.id)}>{Ico.remove(13)} Remove from Queue</button>
              </div></td>
            </tr>
          ))}</tbody>
        </table>
        {visible.length===0&&<div style={{padding:"48px",textAlign:"center",color:"#6b7280",fontSize:14}}>No patients in this department queue.</div>}
      </div>
    </>
  );
}

/* ══════════════════════════════════════════════
   CLINICAL PAGE
══════════════════════════════════════════════ */

    <>

          <h1 className="page-title">{sel.name}</h1>
          <p className="page-subtitle">{sel.mrn} · {sel.date} · {sel.doctor}</p>
        </div>
        <span className={`badge badge-${sel.status==="completed"?"completed-c":sel.status==="in-progress"?"progress-c":"pending-c"}`} style={{padding:"6px 14px",fontSize:13}}>

        <div className="card-hd"><span className="card-title">Diagnosis & Notes</span></div>
        <div style={{padding:20}}>
          <div style={{marginBottom:14}}><div style={{fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>Diagnosis</div><div style={{fontSize:14,fontWeight:600}}>{sel.diagnosis}</div></div>
          <div><div style={{fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>Clinical Notes</div><div style={{fontSize:14,color:"#374151",lineHeight:1.7}}>{sel.notes}</div></div>
        </div>

    <>

        <div><h1 className="page-title">Clinical Records</h1><p className="page-subtitle">Today's consultations and medical notes</p></div>
        <button className="btn-call">{Ico.plus()} New Consultation</button>
      </div>
      <div className="stats-grid stats-3" style={{marginBottom:16}}>
        {[["Today's Consultations",CLINICAL_DATA.length,"Feb 24, 2026","c-green"],["Completed",CLINICAL_DATA.filter(c=>c.status==="completed").length,"Finalized",""],["In Progress",CLINICAL_DATA.filter(c=>c.status==="in-progress").length,"Ongoing","c-blue"]].map(([l,v,s,c])=>(
          <div className="stat-card2" key={l}><div className="stat-label2">{l}</div><div className={`stat-value2 ${c}`}>{v}</div><div className="stat-sub2">{s}</div></div>

      </div>
      <div className="card">
        <div className="card-hd"><div className="card-hd-left"><span className="card-title">Consultations</span><span className="pill-count">{visible.length} records</span></div></div>
        <div className="tabs-bar">
          {[["all","All"],["completed","Completed"],["in-progress","In Progress"],["pending","Pending"]].map(([v,l])=>(
            <button key={v} className={`tab-btn${tab===v?" active":""}`} onClick={()=>setTab(v)}>{l}<span className="tab-pill">{v==="all"?CLINICAL_DATA.length:CLINICAL_DATA.filter(c=>c.status===v).length}</span></button>
          ))}
        </div>
        <table className="tbl">
          <thead><tr><th>Patient</th><th>MRN</th><th>Doctor</th><th>Date</th><th>Diagnosis</th><th>Status</th><th></th></tr></thead>
          <tbody>{visible.map(c=>(
            <tr key={c.id} style={{cursor:"pointer"}} onClick={()=>setSel(c)}>
              <td><div className="pt-name">{c.name}</div></td>
              <td>{c.mrn}</td><td>{c.doctor}</td><td>{c.date}</td><td>{c.diagnosis}</td>
              <td><span className={`badge badge-${c.status==="completed"?"completed-c":c.status==="in-progress"?"progress-c":"pending-c"}`}>{c.status==="in-progress"?"In Progress":c.status.charAt(0).toUpperCase()+c.status.slice(1)}</span></td>
              <td><button className="link-btn" onClick={e=>{e.stopPropagation();setSel(c);}}>View →</button></td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </>
  );
}

/* ══════════════════════════════════════════════
   BILLING PAGE
══════════════════════════════════════════════ */
function BillingPage() {
  const [filter,setFilter]=useState("all");
  const visible=filter==="all"?BILLING_DATA:BILLING_DATA.filter(b=>b.status===filter);
  const paid=BILLING_DATA.filter(b=>b.status==="paid").reduce((s,b)=>s+parseInt(b.amount.replace(/[₦,]/g,"")),0);
  const pending=BILLING_DATA.filter(b=>b.status!=="paid").reduce((s,b)=>s+parseInt(b.amount.replace(/[₦,]/g,"")),0);
  return (
    <>
      <div className="pat-header">
        <div><h1 className="page-title">Billing</h1><p className="page-subtitle">Manage patient invoices and payments</p></div>
        <button className="btn-call">{Ico.plus()} New Invoice</button>
      </div>
      <div className="stats-grid stats-4" style={{marginBottom:16}}>
        {[["Today's Revenue","₦"+paid.toLocaleString(),"Collected","c-green"],["Outstanding","₦"+pending.toLocaleString(),"Unpaid / partial","c-red"],["Invoices Raised",BILLING_DATA.length,"Today",""],["Fully Paid",BILLING_DATA.filter(b=>b.status==="paid").length,"Cleared",""]].map(([l,v,s,c])=>(
          <div className="stat-card2" key={l}><div className="stat-label2">{l}</div><div className={`stat-value2 ${c}`}>{v}</div><div className="stat-sub2">{s}</div></div>
        ))}
      </div>
      <div className="card">
        <div className="card-hd">
          <div className="card-hd-left"><span className="card-title">Invoices</span><span className="pill-count">{visible.length} records</span></div>
          <select className="filter-sel" value={filter} onChange={e=>setFilter(e.target.value)}>
            <option value="all">All</option><option value="paid">Paid</option><option value="unpaid">Unpaid</option><option value="partial">Partial</option>
          </select>
        </div>
        <table className="tbl">
          <thead><tr><th>Patient</th><th>MRN</th><th>Date</th><th>Service</th><th>Amount</th><th>Method</th><th>Status</th><th></th></tr></thead>
          <tbody>{visible.map(b=>(
            <tr key={b.id}>
              <td><div className="pt-name">{b.name}</div></td>
              <td>{b.mrn}</td><td>{b.date}</td><td>{b.service}</td>
              <td style={{fontWeight:700}}>{b.amount}</td>
              <td style={{color:b.method==="—"?"#9ca3af":"#374151"}}>{b.method}</td>

              <td><button className="link-btn">Manage</button></td>
            </tr>
          ))}</tbody>
        </table>
      </div>

/* ══════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════ */
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [role, setRole]         = useState(null);
  const [page, setPage]         = useState("dashboard");
  const [patients, setPatients] = useState(INIT_PATIENTS);

  const handleLogin = (selectedRole) => {
    setRole(selectedRole);
    setLoggedIn(true);
    setPage("dashboard");
  };

  const handleLogout = () => {
    setLoggedIn(false);
    setRole(null);
    setPage("dashboard");
  };

  const addPatient = d => setPatients(p=>[{
    ...d, id:p.length+1, name:`${d.firstName} ${d.lastName}`,
    mrn:`6030-LUTH-00${6000+p.length+1}`, lastVisit:"—", email:d.email||"—",
  },...p]);

  if (!loggedIn) return (
    <>
      <style>{styles}</style>
      <LoginScreen onLogin={handleLogin} />
    </>
  );

  const user     = DEMO_USERS[role];
  const roleInfo = ROLES.find(r=>r.id===role);
  const navIds   = NAV_BY_ROLE[role] || NAV_BY_ROLE.admin;
  const navItems = ALL_NAV.filter(n=>navIds.includes(n.id));

  const renderPage = () => {
    if(page==="dashboard") return <DashboardPage user={user} role={role} setPage={setPage} patients={patients}/>;
    if(page==="patients")  return <PatientsPage patients={patients} onAdd={addPatient}/>;
    if(page==="queue")     return <QueuePage />;
    if(page==="clinical")  return <ClinicalPage />;
    if(page==="billing")   return <BillingPage />;
    if(page==="reports")   return <ReportsPage />;
  };

  const pageLabel = { dashboard:"Dashboard", patients:"Search Patients", queue:"Outpatient Queue", clinical:"Clinical Records", billing:"Billing", reports:"Reports" };

  return (
    <>
      <style>{styles}</style>
      <div className="app">
        {/* SIDEBAR */}
        <aside className="sidebar">
          <div className="sidebar-logo">
            <div className="logo-icon">6H</div>
            <span className="logo-text">6030 Health</span>
          </div>
          <nav className="sidebar-nav">
            {navItems.map(n=>(
              <button key={n.id} className={`nav-item${page===n.id?" active":""}`} onClick={()=>setPage(n.id)}>
                {n.icon}{n.label}
                {n.badge&&page!=="queue"&&<span className="nav-badge">{n.badge}</span>}
              </button>
            ))}
          </nav>
          <div className="sidebar-bottom">
            <div className="user-pill">
              <div className="s-avatar" style={{background:"#22c55e"}}>{user.initials}</div>
              <div style={{display:"flex",flexDirection:"column",minWidth:0}}>
                <span className="user-name" style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:130}}>{user.name}</span>
                <span className="user-role-lbl">{roleInfo.name}</span>
              </div>
            </div>
            <button className="logout-btn" onClick={handleLogout}>
              {Ico.logout()} Sign Out
            </button>
          </div>
        </aside>

        {/* MAIN */}
        <main className="main">
          <div className="topbar">
            <div className="breadcrumb">
              <button className="bc-link" onClick={()=>setPage("dashboard")}>6030 Health</button>
              <span className="bc-sep">/</span>
              <span className="bc-cur">{pageLabel[page]}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div className="topbar-search" onClick={()=>{ if(page!=="dashboard"&&page!=="patients") setPage("patients"); }}>
                {Ico.search(14)}<span>Search patients...</span><kbd className="kbd">⌘K</kbd>
              </div>
              <button className="notif-btn">{Ico.bell(16)}<span className="notif-dot"/></button>
            </div>
          </div>
          <div className="content">{renderPage()}</div>
        </main>
      </div>
    </>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
